// =========================================================
// model.cfg — LF_PowerGrid
//
// CfgModels + CfgSkeletons for ALL models with:
//   - hiddenSelections (material/texture swap at runtime)
//   - AnimationSources (scripted bone animations)
//
// Class name = p3d filename WITHOUT extension (case-sensitive).
// sections[] = named selections that binarize must separate
//              into independent mesh sections for SetObjectMaterial.
//
// Without these entries, hiddenSelections in CfgVehicles have
// no effect — SetObjectMaterial silently does nothing because
// the engine has no separated section to target.
// =========================================================

class CfgSkeletons
{
    class switch_v1_skeleton
    {
        isDiscrete      = 0;
        skeletonInherit = "";
        skeletonBones[] =
        {
            "unit",           "",
            "switch",         "",
            "light_led",      "",
            "port_input_0",   "",
            "port_output_0",  ""
        };
    };

    class switch_v2_skeleton
    {
        isDiscrete      = 0;
        skeletonInherit = "";
        skeletonBones[] =
        {
            "unit",           "",
            "switch",         "unit",
            "light_led",      "unit",
            "port_input_0",   "unit",
            "port_output_0",  "unit"
        };
    };

    class AND_OR_XOR_Memory_cell_skeleton
    {
        isDiscrete      = 0;
        skeletonInherit = "";
        skeletonBones[] =
        {
            "unit",           "",
            "lid",            "unit",
            "latches",        "unit",
            "light_led",      "unit",
            "port_input_0",   "unit",
            "port_input_1",   "unit",
            "port_output_0",  "unit"
        };
    };

    // v1.8.0: Pressure Pad skeleton
    class pressure_pad_skeleton
    {
        isDiscrete      = 0;
        skeletonInherit = "";
        skeletonBones[] =
        {
            "unit",             "",
            "pressure_pad",     "",
            "light_led",        "",
            "port_input_0",     "",
            "port_output_0",    ""
        };
    };

    // v1.9.0: Laser Detector skeleton
    class laser_detector_skeleton
    {
        isDiscrete      = 0;
        skeletonInherit = "";
        skeletonBones[] =
        {
            "unit",             "",
            "laser_detector",   "",
            "light_led",        "",
            "port_input_0",     "",
            "port_output_0",    "",
            "port_input_1",     "",
            "port_output_1",    ""
        };
    };
};

class CfgModels
{
    class Default
    {
        sectionsInherit = "";
        sections[] = {};
        skeletonName = "";
    };

    // ---------------------------------------------------------
    // Splitter (LF_Splitter_Kit + LF_Splitter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // ---------------------------------------------------------
    class lf_splitter : Default
    {
        sections[] = {"zbytek"};
    };

    // ---------------------------------------------------------
    // Ceiling Light
    // hiddenSelections = {"light_emit"}
    // ---------------------------------------------------------
    class lf_ceiling_light : Default
    {
        sections[] = {"light_emit"};
    };

    // ---------------------------------------------------------
    // Camera (CCTV)
    // hiddenSelections = {"cam_led"}
    // ---------------------------------------------------------
    class CamaraLF : Default
    {
        sections[] = {"cam_led"};
    };

    // ---------------------------------------------------------
    // Monitor (CCTV)
    // hiddenSelections = {"screen"}
    // ---------------------------------------------------------
    class MonitorLF : Default
    {
        sections[] = {"screen"};
    };

    // ---------------------------------------------------------
    // Switch (LFPG_PushButton_Kit + LFPG_PushButton share model)
    // hiddenSelections = {"light_led"}
    // AnimationSources = switch (translation)
    // ---------------------------------------------------------
    class switch_v1 : Default
    {
        skeletonName = "switch_v1_skeleton";

        sections[] =
        {
            "switch",
            "light_led",
            "camo"
        };

        class Animations
        {
            class SwitchToggle
            {
                type       = "translation";
                source     = "switch_state";
                selection  = "switch";
                axis       = "switch_axis";
                memory     = 1;
                minValue   = 0;
                maxValue   = 1;
                offset0    = 0;
                offset1    = 0.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Switch V2 (LFPG_SwitchV2_Kit + LFPG_SwitchV2 share model)
    // hiddenSelections = {"light_led"}
    // AnimationSources = switch (rotation)
    // ---------------------------------------------------------
    class switch_v2 : Default
    {
        skeletonName = "switch_v2_skeleton";

        sections[] =
        {
            "switch",
            "light_led",
            "camo"
        };

        class Animations
        {
            class LeverToggle
            {
                type       = "rotation";
                source     = "switch";
                selection  = "switch";
                axis       = "switch_axis";
                memory     = 1;
                minValue   = 0.0;
                maxValue   = 1.0;
                angle0     = 0.0;
                angle1     = -3.0;
            };
        };
    };

    // ---------------------------------------------------------
    // Water Pump T1
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Water Pump T2
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump_t2 : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Furnace
    // hiddenSelections = {"body"}
    // ---------------------------------------------------------
    class Furnace : Default
    {
        sections[] = {"body"};
    };

    // ---------------------------------------------------------
    // Sorter (LF_Sorter_Kit + LF_Sorter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // Device: hiddenSelections = {"sorter_led"}
    // Both selections must be in sections[] for the same model.
    // ---------------------------------------------------------
    class lf_sorter : Default
    {
        sections[] = {"zbytek", "sorter_led"};
    };

    // ---------------------------------------------------------
    // Logic Gate (AND / OR / XOR — shared model)
    // hiddenSelections = {"camo", "light_led_input0",
    //                     "light_led_input1", "light_led_output0"}
    // AnimationSources = open_lid (latches + lid rotation)
    // ---------------------------------------------------------
    class AND_OR_XOR_Memory_cell : Default
    {
        skeletonName = "AND_OR_XOR_Memory_cell_skeleton";

        sections[] =
        {
            "unit",
            "lid",
            "latches",
            "bolts",
            "light_led_input0",
            "light_led_input1",
            "light_led_output0",
            "camo"
        };

        class Animations
        {
            class open_lid
            {
                source = "user";
                memory = 1;
            };
            class latches
            {
                type       = "rotation";
                source     = "open_lid";
                selection  = "latches";
                axis       = "latches_axis";
                memory     = 1;
                minValue   = 0.0;
                maxValue   = 0.2;
                angle0     = 0.0;
                angle1     = -0.5;
            };
            class lid
            {
                type       = "rotation";
                source     = "open_lid";
                selection  = "lid";
                axis       = "lid_axis";
                memory     = 1;
                minValue   = 0.2;
                maxValue   = 1.0;
                angle0     = 0.0;
                angle1     = -1.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Pressure Pad (v1.8.0)
    // LFPG_PressurePad_Kit + LFPG_PressurePad share model
    // AnimationSources = pad_press (translation, Y-axis depression)
    // sections: pressure_pad (animated), light_led, screen, camo
    // ---------------------------------------------------------
    class pressure_pad : Default
    {
        skeletonName = "pressure_pad_skeleton";

        sections[] =
        {
            "pressure_pad",
            "light_led",
            "screen",
            "camo"
        };

        class Animations
        {
            class PadPress
            {
                type       = "translation";
                source     = "pad_press";
                selection  = "pressure_pad";
                axis       = "pressure_pad_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Laser Detector (v1.9.0)
    // LFPG_LaserDetector_Kit + LFPG_LaserDetector share model
    // hiddenSelections = {"light_led"} for LED material swap
    // P3D selections: unit, light_led, port_input_0/1, port_output_0/1
    // ---------------------------------------------------------
    class laser_detector : Default
    {
        skeletonName = "laser_detector_skeleton";

        sections[] =
        {
            "light_led"
        };
    };
};
