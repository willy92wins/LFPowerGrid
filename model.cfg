                source     = "show_0";
                memory     = 1;
                selection  = "seg_3";
                axis       = "seg_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
            class show_0d
            {
                type       = "translation";
                source     = "show_0";
                memory     = 1;
                selection  = "seg_5";
                axis       = "seg_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
            class show_0e
            {
                type       = "translation";
                source     = "show_0";
                memory     = 1;
                selection  = "seg_6";
                axis       = "seg_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
            class show_0f
            {
                type       = "translation";
                source     = "show_0";
                memory     = 1;
                selection  = "seg_7";
                axis       = "seg_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };

            // ---- Digit 1: seg_3, seg_6 ----
            class show_1
            {
                source = "user";
                memory = 1;
            };
            class show_1a
            {
                type       = "translation";
                source     = "show_1";
                memory     = 1;
                selection  = "seg_3";
                axis       = "seg_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
