// =========================================================
// model.cfg — LF_PowerGrid
//
// CfgModels + CfgSkeletons for ALL models with:
//   - hiddenSelections (material/texture swap at runtime)
//   - AnimationSources (scripted bone animations)
//
// Class name = p3d filename WITHOUT extension (case-sensitive).
// sections[] = named selections that binarize must separate
//              into independent mesh sections for SetObjectMaterial.
//
// Without these entries, hiddenSelections in CfgVehicles have
// no effect — SetObjectMaterial silently does nothing because
// the engine has no separated section to target.
// =========================================================

class CfgSkeletons
{
    class Skeleton_LFPG_Button
    {
        isDiscrete = 1;
        skeletonBones[] =
        {
            "button_push", ""
        };
    };
};

class CfgModels
{
    class Default
    {
        sectionsInherit = "";
        sections[] = {};
        skeletonName = "";
    };

    // ---------------------------------------------------------
    // Splitter (LF_Splitter_Kit + LF_Splitter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // ---------------------------------------------------------
    class lf_splitter : Default
    {
        sections[] = {"zbytek"};
    };

    // ---------------------------------------------------------
    // Ceiling Light
    // hiddenSelections = {"light_emit"}
    // ---------------------------------------------------------
    class lf_ceiling_light : Default
    {
        sections[] = {"light_emit"};
    };

    // ---------------------------------------------------------
    // Camera (CCTV)
    // hiddenSelections = {"cam_led"}
    // ---------------------------------------------------------
    class CamaraLF : Default
    {
        sections[] = {"cam_led"};
    };

    // ---------------------------------------------------------
    // Monitor (CCTV)
    // hiddenSelections = {"screen"}
    // ---------------------------------------------------------
    class MonitorLF : Default
    {
        sections[] = {"screen"};
    };

    // ---------------------------------------------------------
    // Push Button (animated + LED)
    // hiddenSelections = {"led_indicator"}
    // AnimationSources = button_state (translation)
    // ---------------------------------------------------------
    class lfpg_button : Default
    {
        skeletonName = "Skeleton_LFPG_Button";

        sections[] =
        {
            "led_indicator",
            "camo"
        };

        class Animations
        {
            class ButtonPush
            {
                type       = "translation";
                source     = "button_state";
                selection  = "button_push";
                axis       = "button_axis";
                memory     = 1;
                minValue   = 0;
                maxValue   = 1;
                offset0    = 0;
                offset1    = -0.003;
            };
        };
    };

    // ---------------------------------------------------------
    // Water Pump T1
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Water Pump T2
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump_t2 : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Furnace
    // hiddenSelections = {"body"}
    // ---------------------------------------------------------
    class Furnace : Default
    {
        sections[] = {"body"};
    };

    // ---------------------------------------------------------
    // Sorter (LF_Sorter_Kit + LF_Sorter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // Device: hiddenSelections = {"sorter_led"}
    // Both selections must be in sections[] for the same model.
    // ---------------------------------------------------------
    class lf_sorter : Default
    {
        sections[] = {"zbytek", "sorter_led"};
    };
};
