    class pressure_pad : Default
    {
        skeletonName = "pressure_pad_skeleton";

        sections[] =
        {
            "pressure_pad",
            "light_led",
            "screen",
            "camo"
        };

        class Animations
        {
            class PadPress
            {
                type       = "translation";
                source     = "pad_press";
                selection  = "pressure_pad";
                axis       = "pressure_pad_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Laser Detector (v1.9.0)
    // LFPG_LaserDetector_Kit + LFPG_LaserDetector share model
    // hiddenSelections = {"light_led"} for LED material swap
    // P3D selections: unit, light_led, port_input_0/1, port_output_0/1
    // ---------------------------------------------------------
    class laser_detector : Default
    {
        skeletonName = "laser_detector_skeleton";

        sections[] =
