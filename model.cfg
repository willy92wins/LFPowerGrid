class CfgModels
{
    class Default
    {
        sectionsInherit = "";
        sections[] = {};
        skeletonName = "";
    };

    // ---------------------------------------------------------
    // Splitter (LFPG_Splitter_Kit + LFPG_Splitter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // ---------------------------------------------------------
    class lf_splitter : Default
    {
        sections[] = {"zbytek"};
    };

    // ---------------------------------------------------------
    // Ceiling Light
    // hiddenSelections = {"light_emit"}
    // ---------------------------------------------------------
    class lf_ceiling_light : Default
    {
        sections[] = {"light_emit"};
    };

    // ---------------------------------------------------------
    // Wall Lamp
    // hiddenSelections = {"light_emit"}
    // Same emissive bulb pattern as ceiling light, wall-mounted.
    // ---------------------------------------------------------
    class lf_wall_lamp : Default
    {
        sections[] = {"light_emit"};
    };

    // ---------------------------------------------------------
    // Camera (CCTV)
    // hiddenSelections = {"cam_led"}
    // ---------------------------------------------------------
    class CamaraLF : Default
    {
        sections[] = {"cam_led"};
    };

    // ---------------------------------------------------------
    // Monitor (CCTV)
    // hiddenSelections = {"screen"}
    // ---------------------------------------------------------
    class MonitorLF : Default
    {
        sections[] = {"screen"};
    };

    // ---------------------------------------------------------
    // Switch (LFPG_PushButton_Kit + LFPG_PushButton share model)
    // hiddenSelections = {"light_led"}
    // AnimationSources = switch (translation)
    // ---------------------------------------------------------
    class switch_v1 : Default
    {
        skeletonName = "switch_v1_skeleton";

        sections[] =
        {
            "switch",
            "light_led",
            "camo"
        };

        class Animations
        {
            class SwitchToggle
            {
                type       = "translation";
                source     = "switch_state";
                selection  = "switch";
                axis       = "switch_axis";
                memory     = 1;
                minValue   = 0;
                maxValue   = 1;
                offset0    = 0;
                offset1    = 0.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Switch V2 (LFPG_SwitchV2_Kit + LFPG_SwitchV2 share model)
    // hiddenSelections = {"light_led"}
    // AnimationSources = switch (rotation)
    // ---------------------------------------------------------
    class switch_v2 : Default
    {
        skeletonName = "switch_v2_skeleton";

        sections[] =
        {
            "switch",
            "light_led",
            "camo"
        };

        class Animations
        {
            class LeverToggle
            {
                type       = "rotation";
                source     = "switch";
                selection  = "switch";
                axis       = "switch_axis";
                memory     = 1;
                minValue   = 0.0;
                maxValue   = 1.0;
                angle0     = 0.0;
                angle1     = -3.0;
            };
        };
    };

    // ---------------------------------------------------------
    // Switch V1 Remote (LF_SwitchRemote_Kit + LF_SwitchRemote share model)
    // hiddenSelections = {"camo", "camoswitch", "light_led"}
    // AnimationSources = switch (translation)
    // RF-capable remote toggle via Intercom broadcast
    // ---------------------------------------------------------
    class switch_v1_remote : Default
    {
        skeletonName = "switch_v1_remote_skeleton";

        sections[] =
        {
            "switch",
            "light_led",
            "camo"
        };

        class Animations
        {
            class switch
            {
                type       = "translation";
                source     = "user";
                selection  = "switch";
                axis       = "switch_axis";
                minValue   = 0.0;
                maxValue   = 1.0;
                offset0    = 0.0;
                offset1    = 0.5;
            };
        };
    };

    // ---------------------------------------------------------
    // Water Pump T1
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Water Pump T2
    // hiddenSelections = {"pump_led"}
    // ---------------------------------------------------------
    class lf_waterpump_t2 : Default
    {
        sections[] = {"pump_led"};
    };

    // ---------------------------------------------------------
    // Furnace
    // hiddenSelections = {"body"}
    // ---------------------------------------------------------
    class Furnace : Default
    {
        sections[] = {"body"};
    };

    // ---------------------------------------------------------
    // Sorter (LFPG_Sorter_Kit + LFPG_Sorter share model)
    // Kit: hiddenSelections = {"zbytek"}
    // Device: hiddenSelections = {"sorter_led"}
    // Both selections must be in sections[] for the same model.
    // ---------------------------------------------------------
    class lf_sorter : Default
    {
        sections[] = {"zbytek", "sorter_led"};
    };

    // ---------------------------------------------------------
    // Logic Gate (AND / OR / XOR — shared model)
    // hiddenSelections = {"camo", "light_led_input0",
    //                     "light_led_input1", "light_led_output0"}
    // AnimationSources = open_lid (latches + lid rotation)
    // ---------------------------------------------------------
    class AND_OR_XOR_Memory_cell : Default
    {
        skeletonName = "AND_OR_XOR_Memory_cell_skeleton";

        sections[] =
        {
            "unit",
            "lid",
            "latches",
            "bolts",
            "light_led_input0",
            "light_led_input1",
            "light_led_output0",
            "camo",
            "camosymbol"
        };

        class Animations
        {
            class open_lid
            {
                source = "user";
                memory = 1;
            };
            class latches
            {
                type       = "rotation";
                source     = "open_lid";
                selection  = "latches";
                axis       = "latches_axis";
                memory     = 1;
                minValue   = 0.0;
                maxValue   = 0.2;
                angle0     = 0.0;
                angle1     = -0.5;
            };
            class lid
            {
                type       = "rotation";
                source     = "open_lid";
                selection  = "lid";
                axis       = "lid_axis";
                memory     = 1;
                minValue   = 0.2;
                maxValue   = 1.0;
                angle0     = 0.0;
                angle1     = -1.5;
            };
        };
    };

    // v2.1.0: Per-variant CfgModels (proxy texture fix — 1 parent + 1 lid per variant)
    class gate_and : AND_OR_XOR_Memory_cell
    {
        skeletonName = "gate_and_skeleton";
    };
    class gate_or : AND_OR_XOR_Memory_cell
    {
        skeletonName = "gate_or_skeleton";
    };
    class gate_xor : AND_OR_XOR_Memory_cell
    {
        skeletonName = "gate_xor_skeleton";
    };
    class memory_cell : AND_OR_XOR_Memory_cell
    {
        skeletonName = "memory_cell_skeleton";

        sections[] =
        {
            "unit",
            "lid",
            "latches",
            "bolts",
            "light_led_input0",
            "light_led_input1",
            "light_led_output0",
            "light_led_input2",
            "light_led_input3",
            "camo",
            "camosymbol"
        };
    };

